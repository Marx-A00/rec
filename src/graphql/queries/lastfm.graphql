# Last.fm Integration Mutations

mutation ConnectLastfm($username: String!) {
  connectLastfm(username: $username) {
    success
    error
    username
    profileImage
    totalPlaycount
    registeredAt
  }
}

mutation ConfirmLastfmConnection($username: String!) {
  confirmLastfmConnection(username: $username) {
    id
    lastfmUsername
    lastfmConnectedAt
    showLastfmStats
    lastfmSyncEnabled
  }
}

mutation DisconnectLastfm {
  disconnectLastfm {
    id
    lastfmUsername
    lastfmConnectedAt
  }
}

mutation TriggerLastfmSync {
  triggerLastfmSync
}

mutation EnsureArtistsFromMbids($artists: [ArtistMbidInput!]!) {
  ensureArtistsFromMbids(artists: $artists) {
    id
    name
    musicbrainzId
    imageUrl
    cloudflareImageId
  }
}

# Last.fm Album Import Match
query AlbumImportMatch($collectionId: String!) {
  albumImportMatch(collectionId: $collectionId) {
    readyNow {
      id
      title
      musicbrainzId
      coverArtUrl
      cloudflareImageId
      artistName
    }
    canBeFetched {
      mbid
      name
      artistName
      playcount
    }
    alreadyAdded {
      id
      title
      musicbrainzId
      coverArtUrl
      cloudflareImageId
      artistName
    }
    skipped {
      name
      artistName
    }
  }
}

# Last.fm Stats Query
query GetUserLastfmStats($userId: String!) {
  user(id: $userId) {
    id
    lastfmStats {
      username
      totalPlaycount
      totalArtists
      totalAlbums
      topArtists {
        name
        playcount
        mbid
        artistId
        imageUrl
        cloudflareImageId
      }
      topAlbums {
        name
        artistName
        playcount
        mbid
        albumId
      }
      lastSyncedAt
      allImagesResolved
    }
  }
}
