# Last.fm Integration Mutations

mutation ConnectLastfm($username: String!) {
  connectLastfm(username: $username) {
    success
    error
    username
    profileImage
    totalPlaycount
    registeredAt
  }
}

mutation ConfirmLastfmConnection($username: String!) {
  confirmLastfmConnection(username: $username) {
    id
    lastfmUsername
    lastfmConnectedAt
    showLastfmStats
    lastfmSyncEnabled
  }
}

mutation DisconnectLastfm {
  disconnectLastfm {
    id
    lastfmUsername
    lastfmConnectedAt
  }
}

mutation TriggerLastfmSync {
  triggerLastfmSync
}

# Last.fm Stats Query
query GetUserLastfmStats($userId: String!) {
  user(id: $userId) {
    id
    lastfmStats {
      username
      totalPlaycount
      totalArtists
      totalAlbums
      topArtists {
        name
        playcount
        mbid
        artistId
      }
      topAlbums {
        name
        artistName
        playcount
        mbid
        albumId
      }
      lastSyncedAt
    }
  }
}
