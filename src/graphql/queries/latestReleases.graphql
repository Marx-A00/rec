# Query for fetching latest releases (albums from all sync sources)
query GetLatestReleases(
  $source: String = "all"
  $sortBy: String = "releaseDate"
  $sortOrder: String = "desc"
  $limit: Int = 200
) {
  searchAlbums(
    source: $source
    sortBy: $sortBy
    sortOrder: $sortOrder
    limit: $limit
  ) {
    id
    title
    releaseDate
    coverArtUrl
    cloudflareImageId
    source
    createdAt
    artists {
      artist {
        id
        name
      }
      position
    }
  }
}
