query GetUserProfile($userId: String!) {
  user(id: $userId) {
    id
    username
    email
    image
    bio
    role
    followersCount
    followingCount
    recommendationsCount
    isFollowing
    settings {
      profileVisibility
      showArcadeButton
      arcadeButtonColor
      arcadeButtonSound
      showLastfmStats
    }
    lastfmStats {
      username
      totalPlaycount
      topArtists {
        name
        playcount
        artistId
      }
      lastSyncedAt
    }
  }
}
