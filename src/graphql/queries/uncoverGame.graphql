# Uncover Game Operations
# Client-side queries and mutations for the daily album guessing game

# ============================================
# FRAGMENTS
# ============================================

fragment GameResultGuessFields on GameResultGuess {
  guessNumber
  albumId
  albumTitle
  artistName
  isCorrect
  isSkipped
}

fragment GameResultFields on GameResult {
  won
  attemptCount
  guesses {
    ...GameResultGuessFields
  }
  completedAt
}

query DailyPuzzle {
  dailyPuzzle {
    challengeId
    date
    maxAttempts
    imageUrl
    cloudflareImageId
    textRegions {
      x
      y
      w
      h
    }
    correctAlbumId
    correctAlbumTitle
    correctAlbumArtist
    correctAlbumCloudflareImageId
    existingResult {
      ...GameResultFields
    }
  }
}

query ArchivePuzzle($date: DateTime!) {
  archivePuzzle(date: $date) {
    challengeId
    date
    maxAttempts
    imageUrl
    cloudflareImageId
    textRegions {
      x
      y
      w
      h
    }
    correctAlbumId
    correctAlbumTitle
    correctAlbumArtist
    correctAlbumCloudflareImageId
    existingResult {
      ...GameResultFields
    }
  }
}

mutation ResetDailySession {
  resetDailySession
}

mutation SubmitGameResult($input: SubmitGameResultInput!) {
  submitGameResult(input: $input) {
    success
    stats {
      id
      gamesPlayed
      gamesWon
      totalAttempts
      currentStreak
      maxStreak
      lastPlayedDate
      winDistribution
      winRate
    }
    archiveStats {
      id
      gamesPlayed
      gamesWon
      totalAttempts
      winDistribution
      winRate
    }
    error
  }
}
