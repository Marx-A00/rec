mutation AddAlbumToPool($albumId: UUID, $albumData: AlbumInput, $pinnedDate: DateTime) {
  addAlbumToPool(albumId: $albumId, albumData: $albumData, pinnedDate: $pinnedDate) {
    success
    message
    error
    album {
      id
      title
      gameStatus
    }
    curatedChallenge {
      id
    }
  }
}
