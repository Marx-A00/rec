query MyArchiveStats {
  myArchiveStats {
    id
    gamesPlayed
    gamesWon
    totalAttempts
    winDistribution
    winRate
  }
}

query MyUncoverSessions($fromDate: DateTime, $toDate: DateTime) {
  myUncoverSessions(fromDate: $fromDate, toDate: $toDate) {
    id
    challengeDate
    won
    attemptCount
    completedAt
  }
}

query UncoverChallengeDates($fromDate: DateTime, $toDate: DateTime) {
  uncoverChallengeDates(fromDate: $fromDate, toDate: $toDate)
}


