# Game Pool Management Queries and Mutations

query GamePoolStats {
  gamePoolStats {
    eligibleCount
    excludedCount
    neutralCount
    totalWithCoverArt
  }
}

query AlbumsByGameStatus($status: AlbumGameStatus!, $limit: Int, $offset: Int) {
  albumsByGameStatus(status: $status, limit: $limit, offset: $offset) {
    id
    title
    releaseDate
    coverArtUrl
    cloudflareImageId
    gameStatus
    artists {
      artist {
        id
        name
      }
    }
  }
}

query SuggestedGameAlbums($limit: Int, $offset: Int, $syncSource: String, $search: String) {
  suggestedGameAlbums(limit: $limit, offset: $offset, syncSource: $syncSource, search: $search) {
    albums {
      id
      title
      releaseDate
      coverArtUrl
      cloudflareImageId
      gameStatus
      artists {
        artist {
          id
          name
        }
      }
    }
    totalCount
  }
}

query ChallengeHistory($limit: Int, $offset: Int) {
  challengeHistory(limit: $limit, offset: $offset) {
    id
    date
    albumTitle
    artistName
    coverUrl
    cloudflareImageId
    totalPlays
    totalWins
    avgAttempts
    textRegionCount
    textRegions {
      x
      y
      w
      h
      text
    }
  }
}

query UncoverGameStats {
  uncoverGameStats {
    totalChallenges
    totalUniquePlayers
    totalPlays
    totalWins
    overallWinRate
    overallAvgAttempts
    avgPlaysPerChallenge
    globalWinDistribution
    topPlayers {
      userId
      username
      image
      gamesPlayed
      gamesWon
      winRate
      currentStreak
      maxStreak
    }
    recentSessions {
      sessionId
      userId
      username
      image
      challengeDate
      albumTitle
      artistName
      won
      attemptCount
      completedAt
    }
    mostPlayedChallenge {
      challengeId
      date
      albumTitle
      artistName
      coverUrl
      cloudflareImageId
      totalPlays
      totalWins
      winRate
      avgAttempts
    }
    hardestChallenge {
      challengeId
      date
      albumTitle
      artistName
      coverUrl
      cloudflareImageId
      totalPlays
      totalWins
      winRate
      avgAttempts
    }
    easiestChallenge {
      challengeId
      date
      albumTitle
      artistName
      coverUrl
      cloudflareImageId
      totalPlays
      totalWins
      winRate
      avgAttempts
    }
  }
}

mutation UpdateAlbumGameStatus($input: UpdateAlbumGameStatusInput!) {
  updateAlbumGameStatus(input: $input) {
    success
    error
    album {
      id
      title
      gameStatus
    }
  }
}
