# Taste Profile Queries and Mutations

query GetUserTasteProfile($userId: String!) {
  userTasteProfile(userId: $userId) {
    position
    artist {
      id
      name
      imageUrl
      cloudflareImageId
      musicbrainzId
    }
  }
}

query GetTasteMatches($limit: Int) {
  tasteMatches(limit: $limit) {
    user {
      id
      username
      image
      bio
      followersCount
      recommendationsCount
    }
    score
    sharedArtists {
      artist {
        id
        name
        imageUrl
        cloudflareImageId
      }
      sources
    }
    overlapCount
    isFollowing
  }
}

mutation SetTasteProfile($artistIds: [String!]!) {
  setTasteProfile(artistIds: $artistIds) {
    position
    artist {
      id
      name
      imageUrl
      cloudflareImageId
    }
  }
}
