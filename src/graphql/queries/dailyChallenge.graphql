# Daily Challenge Queries and Mutations

query DailyChallenge($date: DateTime) {
  dailyChallenge(date: $date) {
    id
    date
    maxAttempts
    totalPlays
    totalWins
    avgAttempts
    imageUrl
    cloudflareImageId
    mySession {
      id
      status
      attemptCount
      won
      startedAt
      completedAt
    }
  }
}

# Admin queries
query CuratedChallenges($limit: Int, $offset: Int) {
  curatedChallenges(limit: $limit, offset: $offset) {
    id
    pinnedDate
    createdAt
    usedDate
    album {
      id
      title
      cloudflareImageId
      coverArtUrl
      releaseDate
      artists {
        artist {
          id
          name
        }
      }
    }
  }
}

query CuratedChallengeCount {
  curatedChallengeCount
}

query UncoverPoolStatus {
  uncoverPoolStatus {
    totalCurated
    totalUsed
    remaining
    selectionMode
    poolExhaustedMode
  }
}

query UncoverSettings {
  uncoverSettings {
    selectionMode
    poolExhaustedMode
  }
}

# Admin mutations
mutation AddCuratedChallenge($albumId: UUID!, $pinnedDate: DateTime) {
  addCuratedChallenge(albumId: $albumId, pinnedDate: $pinnedDate) {
    id
    pinnedDate
    album {
      id
      title
    }
  }
}

mutation RemoveCuratedChallenge($id: UUID!) {
  removeCuratedChallenge(id: $id)
}

mutation PinCuratedChallenge($id: UUID!, $date: DateTime!) {
  pinCuratedChallenge(id: $id, date: $date) {
    id
    pinnedDate
    album {
      id
      title
    }
  }
}

mutation UnpinCuratedChallenge($id: UUID!) {
  unpinCuratedChallenge(id: $id) {
    id
    pinnedDate
    album {
      id
      title
    }
  }
}

mutation UpdateUncoverSettings($selectionMode: String, $poolExhaustedMode: String) {
  updateUncoverSettings(selectionMode: $selectionMode, poolExhaustedMode: $poolExhaustedMode) {
    selectionMode
    poolExhaustedMode
  }
}

mutation ResetUncoverChallenges {
  resetUncoverChallenges {
    success
    jobId
  }
}
