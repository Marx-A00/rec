mutation UpdateUserSettings(
  $theme: String
  $language: String
  $profileVisibility: String
  $showRecentActivity: Boolean
  $showCollections: Boolean
  $showListenLaterInFeed: Boolean
  $showCollectionAddsInFeed: Boolean
  $showOnboardingTour: Boolean
  $showArcadeButton: Boolean
  $arcadeButtonColor: String
  $arcadeButtonSound: String
  $showLastfmStats: Boolean
  $lastfmSyncEnabled: Boolean
  $showTasteProfile: Boolean
) {
  updateUserSettings(
    theme: $theme
    language: $language
    profileVisibility: $profileVisibility
    showRecentActivity: $showRecentActivity
    showCollections: $showCollections
    showListenLaterInFeed: $showListenLaterInFeed
    showCollectionAddsInFeed: $showCollectionAddsInFeed
    showOnboardingTour: $showOnboardingTour
    showArcadeButton: $showArcadeButton
    arcadeButtonColor: $arcadeButtonColor
    arcadeButtonSound: $arcadeButtonSound
    showLastfmStats: $showLastfmStats
    lastfmSyncEnabled: $lastfmSyncEnabled
    showTasteProfile: $showTasteProfile
  ) {
    id
    userId
    theme
    language
    profileVisibility
    showRecentActivity
    showCollections
    showListenLaterInFeed
    showCollectionAddsInFeed
    showOnboardingTour
    emailNotifications
    recommendationAlerts
    followAlerts
    defaultCollectionView
    autoplayPreviews
    showArcadeButton
    arcadeButtonColor
    arcadeButtonSound
    lastfmUsername
    lastfmConnectedAt
    showLastfmStats
    lastfmSyncEnabled
    showTasteProfile
    createdAt
    updatedAt
  }
}
